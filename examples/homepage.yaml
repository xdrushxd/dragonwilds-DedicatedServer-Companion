- Dragonwilds:
    icon: runescape
    description: Runescape Dragonwilds
    server: docker
    container: runescape-dragonwilds
    showstats: true
    widget:
      type: customapi
      url: http://YOUR_DOCKER_HOST_IP:9876/status
      mappings:
        - field: players_online
          label: Players
        - field: players_text
          label: Names
        - field: uptime
          label: Uptime
        - field: last_save
          label: Save
